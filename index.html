<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#cc1019">
  <title>The Elf · ระบบลา & OT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>

  <!-- ░░ LOADING ░░ -->
  <div id="loader" class="loader">
    <div class="loader-logo">
      <img src="logo.png" alt="The Elf" onerror="this.style.display='none';this.parentNode.classList.add('noimg')">
    </div>
    <div class="loader-bar"><i></i></div>
    <div class="loader-text">กำลังโหลด…</div>
  </div>

  <!-- ░░ APP ░░ -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="hd">
      <div class="hd-logo">
        <img src="logo.png" alt="The Elf" onerror="this.style.display='none';this.parentNode.classList.add('noimg')">
      </div>
      <div class="hd-mid">
        <div class="hd-title" id="hdTitle">ระบบลา & OT</div>
        <div class="hd-sub" id="hdSub">บจก.ดิเอลฟ์</div>
      </div>
      <div id="hd-avatar" class="hd-avatar">🙂</div>
    </header>

    <!-- Views -->
    <main id="main" class="main"></main>

    <!-- Bottom nav -->
    <nav class="nav">
      <button class="nav-btn active" data-view="home" aria-label="หน้าหลัก">
        <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg>
        <span>หน้าหลัก</span>
      </button>
      <button class="nav-btn" data-view="leave" aria-label="ลา">
        <svg viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
        <span>ลา</span>
      </button>
      <button class="nav-btn" data-view="ot" aria-label="OT">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12.5" r="8.5"/><path d="M12 8v5l3 2M12 2.5h0"/></svg>
        <span>OT</span>
      </button>
      <button class="nav-btn" data-view="payslip" aria-label="สลิป">
        <svg viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="2"/><circle cx="12" cy="12" r="2.6"/><path d="M6 9h0M18 15h0"/></svg>
        <span>สลิป</span>
      </button>
      <button class="nav-btn" data-view="history" aria-label="ประวัติ">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <span>ประวัติ</span>
      </button>
      <button class="nav-btn" data-view="profile" aria-label="โปรไฟล์">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-6 8-6s8 2 8 6"/></svg>
        <span>โปรไฟล์</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js?v=15"></script>
  <script src="app.js?v=15"></script>
</body>
</html>
