<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#cc1019">
  <title>The Elf · ระบบลา & OT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=45">
</head>
<body>

  <!-- ░░ LOADING ░░ -->
  <div id="loader" class="loader">
    <div class="loader-logo">
      <img src="logo.png" alt="The Elf" onerror="this.style.display='none';this.parentNode.classList.add('noimg')">
    </div>
    <div class="loader-bar"><i></i></div>
    <div class="loader-text">กำลังโหลด…</div>
  </div>

  <!-- ░░ APP ░░ -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="hd">
      <div class="hd-logo">
        <img src="logo.png" alt="The Elf" onerror="this.style.display='none';this.parentNode.classList.add('noimg')">
      </div>
      <div class="hd-mid">
        <div class="hd-title" id="hdTitle">ระบบลา & OT</div>
        <div class="hd-sub" id="hdSub">บจก.ดิเอลฟ์</div>
      </div>
      <div id="hd-avatar" class="hd-avatar">🙂</div>
    </header>

    <!-- Topbar (desktop เท่านั้น · โชว์ชื่อเมนูที่กด — แทน header แดง) -->
    <div id="topbar" class="topbar">
      <span class="tb-icon" id="tbIcon">🏠</span>
      <div class="tb-mid">
        <div class="tb-title" id="tbTitle">ระบบลา &amp; OT</div>
        <div class="tb-sub" id="tbSub">บจก.ดิเอลฟ์</div>
      </div>
      <div id="tb-avatar" class="tb-avatar">🙂</div>
    </div>

    <!-- Views -->
    <main id="main" class="main"></main>

    <!-- Bottom nav (มือถือ) / Sidebar (desktop) -->
    <nav class="nav">
      <!-- ░ Brand (desktop sidebar เท่านั้น · แทนโลโก้ในแถบแดง) ░ -->
      <div class="nav-brand">
        <span class="nb-logo"><img src="logo.png" alt="The Elf" onerror="this.style.display='none';this.parentNode.classList.add('noimg')"></span>
        <div class="nb-txt">The Elf<small>HR Console</small></div>
      </div>
      <!-- ═══ ก้อน HR (desktop เท่านั้น · ตามสิทธิ์) ═══ -->
      <div class="nav-sec">ภาพรวม</div>
      <button class="nav-btn nav-admin" data-view="dashboard" aria-label="แดชบอร์ด"><span class="nav-emo">📊</span><span>แดชบอร์ด</span></button>
      <button class="nav-btn nav-admin" data-view="leavecal" aria-label="ปฏิทินการลา"><span class="nav-emo">🗓️</span><span>ปฏิทินการลา</span></button>
      <div class="nav-sec">ดำเนินการ</div>
      <button class="nav-btn nav-admin" data-view="hr" aria-label="อนุมัติทั้งหมด"><span class="nav-emo">✅</span><span>อนุมัติทั้งหมด</span></button>
      <button class="nav-btn nav-admin" data-view="mgleave" aria-label="จัดการการลา"><span class="nav-emo">📋</span><span>จัดการการลา</span></button>
      <button class="nav-btn nav-admin" data-view="mgot" aria-label="จัดการ OT"><span class="nav-emo">⏰</span><span>จัดการ OT</span></button>
      <button class="nav-btn nav-admin" data-view="mgpay" aria-label="จัดการ Payroll"><span class="nav-emo">💰</span><span>จัดการ Payroll</span></button>
      <div class="nav-sec">จัดการ</div>
      <button class="nav-btn nav-admin" data-view="emps" aria-label="พนักงาน"><span class="nav-emo">👥</span><span>พนักงาน</span></button>
      <button class="nav-btn nav-admin" data-view="settings" aria-label="ตั้งค่าระบบ"><span class="nav-emo">⚙️</span><span>ตั้งค่าระบบ</span></button>
      <!-- ═══ ก้อนของฉัน (มือถือ = bottom nav 6 ปุ่มนี้) ═══ -->
      <div class="nav-sec">ข้อมูลของฉัน</div>
      <button class="nav-btn active" data-view="home" aria-label="หน้าหลัก">
        <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg>
        <span>หน้าหลัก</span>
      </button>
      <button class="nav-btn" data-view="profile" aria-label="โปรไฟล์">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-6 8-6s8 2 8 6"/></svg>
        <span>โปรไฟล์</span>
      </button>
      <button class="nav-btn" data-view="leave" aria-label="ขอลา">
        <svg viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
        <span>ขอลา</span>
      </button>
      <button class="nav-btn" data-view="ot" aria-label="ขอ OT">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12.5" r="8.5"/><path d="M12 8v5l3 2M12 2.5h0"/></svg>
        <span>ขอ OT</span>
      </button>
      <button class="nav-btn" data-view="payslip" aria-label="เอกสาร">
        <svg viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="2"/><circle cx="12" cy="12" r="2.6"/><path d="M6 9h0M18 15h0"/></svg>
        <span>เอกสาร</span>
      </button>
      <button class="nav-btn" data-view="history" aria-label="ประวัติ">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <span>ประวัติ</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js?v=29"></script>
  <script src="app.js?v=45"></script>
</body>
</html>
